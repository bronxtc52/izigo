name: Deploy IziGo to Azure Container Apps

# Фаза 0: build образов в ACR (без локального docker) + обновление ACA.
# Требует GitHub secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
# ACR_NAME, RG_NAME, BACKEND_APP, FRONTEND_APP, BACKEND_URL, FRONTEND_URL (см. DEPLOY.md).

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  id-token: write   # OIDC к Azure
  contents: read

# MAJOR G3(1): сериализуем деплои в main. Группа per-ref: все пуши в main делят одну группу и
# идут по очереди (cancel-in-progress:false — идущий деплой НЕ отменяем, новый ждёт), а прогоны
# на разных PR-ветках получают СВОИ группы и не блокируют друг друга. Иначе гонка: побеждает
# финишировавший последним, прод на старом sha.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # P1-hardening (O2): тесты бэка на реальном Postgres (ltree — sqlite не подходит) +
  # lint/build фронта. Гейт для деплоя; на PR — единственное, что выполняется.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: izigo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Job выполняется на runner-хосте → сервис доступен через проброшенный порт
      # на 127.0.0.1 (имя сервиса резолвится только в container-jobs).
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_DATABASE: izigo_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pgsql, bcmath, mbstring, zip
          coverage: none

      - name: Composer install
        working-directory: mh-calc-backend-main
        run: composer install --no-interaction --prefer-dist

      - name: Bootstrap app env
        working-directory: mh-calc-backend-main
        run: |
          cp .env.example .env
          php artisan key:generate

      # Smoke для O1: несобираемый роут/конфиг должен падать здесь, а не на прод-старте
      # (start.sh после снятия `|| true` уронит контейнер). Кэши сразу чистим — иначе
      # закэшированный config заморозит env и сломает phpunit-переменные.
      - name: Route/config cache smoke
        working-directory: mh-calc-backend-main
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan config:clear
          php artisan route:clear

      - name: Run backend tests
        working-directory: mh-calc-backend-main
        run: php artisan test

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mh-calc-frontend-main/package-lock.json

      - name: Frontend lint + build
        working-directory: mh-calc-frontend-main
        run: |
          npm ci
          npm run lint
          npm run build

  deploy:
    # P1-hardening (O2): деплой только после зелёных тестов; pull_request не деплоит.
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build backend image in ACR
        run: |
          az acr build --registry ${{ secrets.ACR_NAME }} \
            --image izigo-backend:${{ github.sha }} \
            ./mh-calc-backend-main

      - name: Build frontend image in ACR
        run: |
          if [ -z "${{ secrets.FRONTEND_SENTRY_DSN }}" ]; then
            echo "::warning::FRONTEND_SENTRY_DSN не задан — фронт соберётся БЕЗ Sentry (init = no-op)"
          fi
          az acr build --registry ${{ secrets.ACR_NAME }} \
            --image izigo-frontend:${{ github.sha }} \
            --build-arg NEXT_PUBLIC_SERVER_BACK_URL=${{ secrets.BACKEND_URL }} \
            --build-arg NEXT_PUBLIC_SERVER_FRONT_URL=${{ secrets.FRONTEND_URL }} \
            --build-arg NEXT_PUBLIC_SERVER_PROD=true \
            --build-arg NEXT_PUBLIC_TON_NETWORK=mainnet \
            --build-arg NEXT_PUBLIC_TON_RPC=https://toncenter.com/api/v2/jsonRPC \
            --build-arg NEXT_PUBLIC_USDT_JETTON_MASTER=EQCxE6mUtQJKFnGfaROTKOt1lZbDiiX1kCixRv7Nw2Id_sDs \
            --build-arg NEXT_PUBLIC_TWA_RETURN_URL=https://t.me/Izigopro_mlm_bot/app \
            --build-arg NEXT_PUBLIC_TG_BOT_USERNAME=Izigopro_mlm_bot \
            --build-arg NEXT_PUBLIC_SENTRY_DSN=${{ secrets.FRONTEND_SENTRY_DSN }} \
            --build-arg NEXT_PUBLIC_SENTRY_RELEASE=${{ github.sha }} \
            ./mh-calc-frontend-main

      - name: Update backend Container App
        run: |
          az containerapp update -n ${{ secrets.BACKEND_APP }} -g ${{ secrets.RG_NAME }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/izigo-backend:${{ github.sha }}

      - name: Update frontend Container App
        run: |
          az containerapp update -n ${{ secrets.FRONTEND_APP }} -g ${{ secrets.RG_NAME }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/izigo-frontend:${{ github.sha }}

      # MAJOR G3(2): пост-деплой смоук — pushed != deployed. `az containerapp update` возвращает
      # управление до того, как новая ревизия реально начнёт обслуживать трафик, поэтому дёргаем
      # бэкенд /api/health (роут B-5, отдаёт heartbeat планировщика) с ретраями и падаем, если не
      # 200. Бэкенд — жёсткий гейт. Фронт — best-effort предупреждение (корень может редиректить/
      # гейтить Mini App, ложить деплой на этом не стоит).
      - name: Post-deploy smoke (/api/health)
        run: |
          BACKEND_URL="${{ secrets.BACKEND_URL }}"
          FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
          # Фолбэки на известные прод-URL, если секреты не заданы.
          [ -n "$BACKEND_URL" ]  || BACKEND_URL="https://ca-izigo-backend.livelycoast-2b4dcf83.northeurope.azurecontainerapps.io"
          [ -n "$FRONTEND_URL" ] || FRONTEND_URL="https://izigo.adarasoft.com"

          probe() {
            local url="$1"
            curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "$url" 2>/dev/null || echo 000
          }

          HEALTH_URL="${BACKEND_URL%/}/api/health"
          echo "Smoke: backend ${HEALTH_URL}"
          ok=""
          for i in $(seq 1 12); do
            code=$(probe "$HEALTH_URL")
            if [ "$code" = "200" ]; then echo "  attempt ${i}: 200 OK"; ok=1; break; fi
            echo "  attempt ${i}: HTTP ${code} — ждём 15s (ревизия ещё поднимается)"
            sleep 15
          done
          if [ -z "$ok" ]; then
            echo "::error::Пост-деплой смоук провален: ${HEALTH_URL} не вернул 200 за 12 попыток. Новая ревизия не обслуживает трафик — деплой считаем неуспешным."
            exit 1
          fi

          # Фронт — не жёсткий гейт.
          fcode=$(probe "${FRONTEND_URL%/}")
          if [ "$fcode" = "200" ]; then
            echo "Smoke: frontend ${FRONTEND_URL} → 200 OK"
          else
            echo "::warning::Фронт ${FRONTEND_URL} вернул HTTP ${fcode} (не 200) — не блокируем деплой (корень может редиректить)."
          fi

  # MAJOR G3(3): бот в пайплайне. Раньше мердж изменений mh-calc-bot/ в main НЕ передеплоивал
  # бота. Цель `ca-izigo-bot` подтверждена в ops/alerts-izigo.sh и ops/izigo-monitoring-setup.md
  # (always-on ACA-приложение в rg-izigo-beta-neu, long-polling, без ingress). Имя переопределяемо
  # секретом BOT_APP; фолбэк — подтверждённое ca-izigo-bot. ACR_NAME/RG_NAME — те же секреты, что
  # у backend/frontend. Dockerfile — mh-calc-bot/Dockerfile. Обновление образа ingress не трогает.
  deploy-bot:
    needs: test
    if: github.event_name != 'pull_request'
    # Деплой бота не верифицирован вживую отсюда (MSI mh-central не видит RG izigo). Пока не
    # подтверждён первый успешный прогон — не роняем деплой-гейт всего workflow из-за бота:
    # сбой этого job не блокирует backend/frontend-деплой и его смоук. После подтверждения
    # живого деплоя бота — убрать continue-on-error, чтобы поломки бота снова были заметны.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build bot image in ACR
        run: |
          az acr build --registry ${{ secrets.ACR_NAME }} \
            --image izigo-bot:${{ github.sha }} \
            ./mh-calc-bot

      - name: Update bot Container App
        run: |
          BOT_APP="${{ secrets.BOT_APP }}"
          [ -n "$BOT_APP" ] || BOT_APP="ca-izigo-bot"   # подтверждено ops/*; секрет переопределяет
          az containerapp update -n "$BOT_APP" -g ${{ secrets.RG_NAME }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/izigo-bot:${{ github.sha }}
